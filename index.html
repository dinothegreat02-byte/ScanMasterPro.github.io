<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScanMaster Pro - Free QR Scanner & Generator</title>
    <meta name="google-site-verification" content="8oQnlpjwdPP25wJPIxyh8nOND2ZzgBDDttChcotEGro" />
    
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f8fafc; text-align: center; padding: 20px; }
        .container { max-width: 900px; margin: auto; display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); flex: 1; min-width: 300px; }
        
        /* Step 2: Finger Tap Animation Styling */
        #reader { 
            width: 100% !important; 
            min-height: 300px; 
            border: 2px dashed #2563eb !important; 
            border-radius: 15px; 
            background-color: #ffffff;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y="0.9em" font-size="70">✋</text></svg>');
            background-size: 80px;
            background-repeat: no-repeat;
            background-position: center;
            animation: tap-move 1.5s ease-in-out infinite;
        }

        @keyframes tap-move {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(0.9) translateY(10px); }
        }

        button { background: #2563eb !important; color: white !important; border: none !important; padding: 12px 25px !important; border-radius: 10px !important; cursor: pointer; font-weight: bold; margin-top: 10px; }
        
        footer { margin-top: 50px; padding: 20px; color: #64748b; font-size: 14px; }
        footer a { color: #2563eb; text-decoration: none; margin: 0 10px; }
    </style>
</head>
<body>

    <h1>ScanMaster Pro 🚀</h1>

    <div class="container">
        <div class="card">
            <h2>INSTANT SCANNER</h2>
            <div id="reader"></div>
        </div>

        <div class="card">
            <h2>QR GENERATOR</h2>
            <input type="text" id="qr-input" placeholder="Paste link here..." style="width:80%; padding:10px; border-radius:8px; border:1px solid #ddd;">
            <br>
            <button onclick="generateQR()">CREATE QR CODE</button>
            <div id="qrcode" style="margin-top:20px; display: flex; justify-content: center;"></div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 ScanMaster Pro | Made by Abdul Mannan</p>
        <a href="privacy-policy.html">Privacy Policy</a> | 
        <a href="terms.html">Terms & Conditions</a> | 
        <a href="contact.html">Contact Us</a>
    </footer>

    <script>
        // 1. Scanner Setup
        function onScanSuccess(decodedText) {
            window.location.href = decodedText;
        }

        let html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
        html5QrcodeScanner.render(onScanSuccess);

        // 2. Generator Setup
        function generateQR() {
            let input = document.getElementById("qr-input").value;
            let qrDiv = document.getElementById("qrcode");
            qrDiv.innerHTML = "";
            if(input) {
                new QRCode(qrDiv, input);
            }
        }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</body>
</html>
